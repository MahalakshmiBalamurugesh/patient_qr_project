<h2>Doctor Dashboard</h2>

<form method="GET" action="/doctor_dashboard">
    Enter Patient ID: <input type="text" name="patient_id">
    <button type="submit">View</button>
</form>

{% if records %}
<table border="1">
<tr>
    <th>Diagnosis</th>
    <th>Prescription</th>
    <th>Notes</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r[3] }}</td>
    <td>{{ r[4] }}</td>
    <td>{{ r[5] }}</td>
</tr>
{% endfor %}
</table>
{% endif %}
